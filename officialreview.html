<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background-color: rgb(102, 75, 67);
  
}

header {
  background-color: rgb(255, 204, 128);
  padding: 10px;
  text-align: center;
  display: flex;
  justify-content: space-between;
}

.header-form{
    width: 250px;
}
.header-spacer{
    width:200px;
    height:100%;
}

/* Style the topnav */
ul.topnav {
  display: flex;
  list-style-type: none;
  justify-content: center;
  margin: 0;
  padding: 0;
  background-color: rgb(51, 51, 51);
  font-weight: bold; font-size: x-large;
}

/* Style links in topnav */
ul.topnav li a {
  display: block;
  color: #f1f1f1;
  padding: 14px 16px;
  text-decoration: none;
}

/* Change color on hover */
ul.topnav li a:hover {
  background-color: rgb(51, 51, 51);
  color: rgb(255, 204, 128);
}



</style>
</head>
<body>

<header>
    <div class="header-spacer"></div>
  <img src="logopng.png" alt="restaurant logo">
  <div class="header-form">
    <form class="d-flex" role="search">
      <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
      <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
  </div>
</header>


<ul class="topnav">
  <li><a href="mainpage.html">Home</a></li>
  <li><a href="reserve.html">reserve </a></li>
  <li><a href="menu.html">menu </a></li>
  <li><a href="about page.html">about page</a></li>
   <li><a href="review page.html">review page</a></li>
    <li><a href="contact.html">contacts</a></li>

</ul>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card reservation-card shadow-lg p-4">
                <h2 class="text-center mb-4" style="color: rgb(102, 75, 67);">Leave a Review</h2>
                
                <form id="reviewForm">
                    <div class="mb-4 text-center">
                        <label class="form-label fw-bold">How was your visit?</label>
                        <div id="starRating" class="fs-1 d-flex justify-content-center gap-2">
                            <span class="star" data-value="1" style="cursor: pointer; color: #ddd;">★</span>
                            <span class="star" data-value="2" style="cursor: pointer; color: #ddd;">★</span>
                            <span class="star" data-value="3" style="cursor: pointer; color: #ddd;">★</span>
                            <span class="star" data-value="4" style="cursor: pointer; color: #ddd;">★</span>
                            <span class="star" data-value="5" style="cursor: pointer; color: #ddd;">★</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Your Name</label>
                        <input type="text" class="form-control" placeholder="Evan grifiths" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">What did you eat?</label>
                        <input type="text" class="form-control" placeholder="e.g. Smoked Brisket" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Your Experience</label>
                        <textarea class="form-control" rows="4" placeholder="Tell us what you thought..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-reserve w-100 py-3">SUBMIT REVIEW</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic to make the stars match the Honeywood theme colors
    const stars = document.querySelectorAll('.star');
    stars.forEach(star => {
        star.addEventListener('click', () => {
            const rating = star.getAttribute('data-value');
            stars.forEach(s => {
                s.style.color = (s.getAttribute('data-value') <= rating) ? 'rgb(255, 204, 128)' : '#ddd';
            });
        });
    });
</script>

  </body>
</html>
